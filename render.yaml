services:
  - type: web
    name: attendance-tracker
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SLACK_BOT_TOKEN
        sync: false          # set manually in Render dashboard
      - key: SLACK_CHANNEL_ID
        sync: false          # set manually in Render dashboard
      - key: CRON_TIMEZONE
        value: America/New_York
      - key: REMINDER_TIME
        value: "30 7 * * *"
    # No disk block — free tier uses project directory for SQLite
